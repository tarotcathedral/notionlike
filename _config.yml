# Site Settings
title: "Tarot Cathedral — Workshop"
author: "Twoje Imię" # Możesz tu wpisać siebie
email: "twoj@email.com"
description: >
  Testowy widok Notion dla bloga Tarot Cathedral.

# URL Settings (Kluczowe dla poprawnego działania podglądu)
url: "https://tarotcathedral.com"
baseurl: "/notionlike"

# Theme Settings
# Zakomentowane, abyś mogła edytować pliki lokalnie i zmieniać wygląd na Notion
# remote_theme: riggraz/no-style-please

# Ustawienia linków (Notion-style: czyste linki bez .html)
permalink: /:title/

# Favicon
favicon: "logo.png"

# Konfiguracja specyficzna dla szablonu no-style-please
theme_config:
  appearance: "light"         # Notion najlepiej wygląda w jasnym trybie
  back_home_text: "← Home"    # Prosta nawigacja
  date_format: "%B %d, %Y"    # Format daty: April 8, 2026 (jak w Notion)
  show_description: true      # Pokaż opis na stronie głównej
  lowercase_titles: false     # Notion nie wymusza małych liter

# Markdown i Sass
markdown: kramdown
sass:
  style: compressed

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jektex

# Twoje ustawienia Jektex (zachowane ze screena)
jektex:
  cache_dir: ".jektex-cache"
  ignore: ["*.xml"]
  silent: false
  macros:
    - ["\\Q", "\\mathbb{Q}"]
    - ["\\C", "\\mathbb{C}"]

# Wykluczenia
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
