---
layout: default
---

<div class="notion-header">
  {% if page.image %}
    <img src="{{ page.image | relative_url }}" class="notion-cover">
  {% else %}
    <div style="width: 100%; height: 180px; background: #f7f7f5;"></div>
  {% endif %}
  
  <div class="notion-icon-container">
    <div style="font-size: 50px; margin-top: -40px; position: absolute;">📄</div>
  </div>
</div>

<article class="notion-title-section" style="margin-bottom: 100px;">
  <header style="margin-bottom: 40px;">
    <h1 style="font-size: 40px; font-weight: 700; margin-bottom: 10px;">{{ page.title }}</h1>
    
    <div style="display: flex; flex-wrap: wrap; align-items: center; gap: 15px; color: rgba(55, 53, 47, 0.5); font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 20px;">
      <span style="display: flex; align-items: center; gap: 5px;">📅 {{ page.date | date: "%B %d, %Y" }}</span>
      
      {% if page.tags %}
      <div style="display: flex; align-items: center; gap: 5px;">
        <span>🏷️</span>
        {% for tag in page.tags %}
          <span class="n-tag tag-{{ tag | slugify }}">{{ tag }}</span>
        {% endfor %}
      </div>
      {% endif %}
    </div>
  </header>

  <div class="post-content" style="font-size: 17px; line-height: 1.8; color: #37352f;">
    {{ content }}
  </div>

  <div style="margin-top: 60px; padding-top: 20px; border-top: 1px solid #eee;">
    <a href="{{ '/' | relative_url }}" style="text-decoration: none; color: rgba(55, 53, 47, 0.5); font-size: 14px;">← Back to Home</a>
  </div>
</article>
